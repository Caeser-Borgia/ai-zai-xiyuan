    text: "我多想 再见到你 那首老歌 还在唱",
    tags: ["🎹 钢琴独奏"],
    l1: { instr: "🎹 钢琴 · 🎤 人声", why: "手风琴和吉他都停了，只剩钢琴" },
    l2: { tech: "减法编曲：配器减少，注意力集中到歌词\"再见到你\"" },
    l3: { tech: "Gm→F→E♭→B♭/D 低音下行：G→F→E♭→D，半音下行线条" },
    why: ["🎯 桥段为什么最打动人心？","① 全部乐器退出 → 只剩钢琴+人声","② 低音半音下行（G→F→E♭→D）→ 像慢慢坐下","③ 桥段最后一拍 → 手风琴突然回来 → 完美衔接副歌"]
  },
  { section: "★ 桥段", time: 112,
    chords: [{name:"Cm",roman:"IIm"},{name:"F",roman:"V"},{name:"B♭",roman:"I"}],
    text: "歌声多悠扬 现实却多惆怅",
    tags: [],
    l1: { instr: "" },
    l2: { tech: "Cm→F→B♭ II-V-I 解决，但情绪没有\"解决\"" },
    l3: { tech: "II-V-I最标准的解决，但旋律是下行 → 解决但不快乐" },
    why: ["🎯 和弦\"解决了\"为什么不开心？","① Cm→F→B♭ 是最标准的和声解决","② 但旋律是往下的 → 和声在说\"好了\"，旋律在说\"唉\"","③ 这就是音乐能表达\"矛盾情感\"的方式"]
  },

  { section: "尾奏", time: 120,
    chords: [{name:"B♭",roman:"I"},{name:"Gm",roman:"VIm"},{name:"E♭",roman:"IV"},{name:"F",roman:"V"}],
    text: "♪ 手风琴再次响起 · 渐弱结束",
    tags: ["🌅 淡出"],
    l1: { instr: "🎹 手风琴回到前奏旋律" },
    l2: { tech: "回到前奏的编配，首尾呼应" },
    l3: { tech: "Fade Out淡出，故事还在继续" },
    why: ["🎯 为什么用淡出？","① 回到前奏手风琴 → 结构闭环","② 淡出 → 小铁匠的故事还在继续，只是你听不到了","③ 全曲结构：前奏→主歌→副歌→间奏→主歌→副歌→桥段→尾奏"]
  },
];

let currentLevel = 1, currentFocus = "all", activeIdx = -1, isPlaying = false;
const audio = new Audio();
audio.src = "米兰的小铁匠-周杰伦.mp3";
audio.volume = 0.8;

function getChord(name) { return CHORD_DB[name] || { type:"major", color:"#4fc3f7", notes:"", roman:"", desc:"", simple:"" }; }
function getChordColor(name) { return getChord(name).color || "#4fc3f7"; }
function formatTime(s) { if(isNaN(s)) return "0:00"; const m=Math.floor(s/60); return `${m}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

function renderLyrics() {
  let html = "", lastSection = "";
  LYRIC_DATA.forEach((line, idx) => {
    if(line.section !== lastSection) { lastSection = line.section; html += `<div class="section-label">${line.section}<span class="badge">${formatTime(line.time)}</span></div>`; }
    let chordRow = "";
    if(line.chords.length > 0) {
      chordRow = `<div class="chord-row">`;
      line.chords.forEach(c => { const cc=getChordColor(c.name); let rd=currentLevel>=2?`<span class="roman">${c.roman}</span>`:""; chordRow += `<span class="chord-tag" style="color:${cc};border:1px solid ${cc}33;" onclick="showChordDetail('${c.name}',event)">${c.name}${rd}</span>`; });
      chordRow += `</div>`;
    }
    let tagRow = "";
    if(line.tags.length > 0 && currentLevel <= 2) {
      tagRow = `<div class="tag-row">`;
      line.tags.forEach(t => { const cls=t.includes("🎸")||t.includes("🎻")||t.includes("🎹")||t.includes("🎤")||t.includes("🎵")||t.includes("🥁")?"instrument":"technique"; tagRow += `<span class="tag ${cls}">${t}</span>`; });
      tagRow += `</div>`;
    }
    html += `<div class="lyric-line" data-idx="${idx}" onclick="clickLine(${idx})"><span class="ts">${formatTime(line.time)}</span><div style="flex:1;">${chordRow}<div class="text">${line.text}</div>${tagRow}</div></div>`;
  });
  document.getElementById('lyricsPanel').innerHTML = html;
}

function updateKnowledge(idx) {
  const line = LYRIC_DATA[idx]; if(!line) return;
  const panel = document.getElementById('knowledgeContent'); let html = "";
  if(currentLevel === 1) {
    if(line.l1?.instr) html += `<div class="k-card show instr-card"><div class="kc-label">🎸 当前乐器</div><div class="kc-body">${line.l1.instr}</div></div>`;
    if(line.l1?.why) html += `<div class="k-card show why-card"><div class="kc-label">💡 注意听</div><div class="kc-body">${line.l1.why}</div></div>`;
  }
  if(currentLevel === 2) {
    if(line.l2?.instr) html += `<div class="k-card show instr-card"><div class="kc-label">🎸 乐器</div><div class="kc-body">${line.l2.instr}</div></div>`;
    if(line.l2?.tech) html += `<div class="k-card show tech-card"><div class="kc-label">💡 编曲手法</div><div class="kc-body">${line.l2.tech}</div></div>`;
    if(line.chords.length > 0) { const cl=line.chords.map(c=>`<span style="color:${getChordColor(c.name)};font-weight:700;font-family:Consolas;">${c.name}</span> (<span style="color:#666;">${c.roman}</span>)`).join(' → '); html += `<div class="k-card show harmony-card"><div class="kc-label">🎹 和弦进行</div><div class="kc-body">${cl}</div></div>`; }
  }
  if(currentLevel === 3) {
    if(line.l3?.instr) html += `<div class="k-card show instr-card"><div class="kc-label">🎸 乐器细节</div><div class="kc-body">${line.l3.instr}</div></div>`;
    if(line.l3?.tech) html += `<div class="k-card show tech-card"><div class="kc-label">💡 高级编曲技术</div><div class="kc-body">${line.l3.tech}</div></div>`;
    if(line.chords.length > 0) { const cl=line.chords.map(c=>`<span style="color:${getChordColor(c.name)};font-weight:700;font-family:Consolas;">${c.name}</span>`).join(' → '); html += `<div class="k-card show harmony-card"><div class="kc-label">🎹 和弦进行</div><div class="kc-body">${cl}</div></div>`; html += `<div class="k-card show chord-card"><div class="kc-label">🎼 和弦构成</div><div class="kc-body">`; line.chords.forEach(c=>{const info=getChord(c.name); html+=`<div style="margin:2px 0;"><span style="color:${info.color};font-weight:700;font-family:Consolas;">${c.name}</span><span style="color:#666;"> = ${info.notes}</span></div>`;}); html+=`</div></div>`; }
  }
  if(line.why && line.why.length > 0) { html += `<div class="k-card show why-card"><div class="kc-label">🎯 为什么这里好听？</div><div class="kc-body" style="font-size:13px;">`; line.why.forEach(w=>{const isH=w.startsWith("🎯"); html+=`<div style="margin:2px 0;${isH?'font-weight:700;color:#c4b59a;margin-bottom:4px;':''}">${w}</div>`;}); html+=`</div></div>`; }
  if(!html) html = '<p style="font-size:12px;color:#555;">暂无注释 · 切换知识难度了解更多</p>';
  panel.innerHTML = html;
}

function showChordDetail(name, evt) {
  const info = getChord(name); if(!info) return;
  const modal = document.createElement('div'); modal.className = 'modal-overlay';
  modal.onclick = function(e) { if(e.target===this) document.body.removeChild(this); };
  const typeLabels = { major:"大三和弦（明亮）", minor:"小三和弦（忧伤）", minor7:"小七和弦（温柔忧伤）", maj7:"大七和弦（梦幻）", dom7:"属七和弦（紧张）" };
  modal.innerHTML = `<div class="modal-box" style="max-width:500px;"><h2 style="color:${info.color};font-family:Consolas;margin-bottom:8px;">${name} <span style="font-size:14px;color:#666;">— ${typeLabels[info.type]||info.type}</span></h2><div style="display:flex;gap:16px;flex-wrap:wrap;"><div style="flex:1;"><div style="font-size:12px;color:#666;margin-bottom:4px;">🎼 构成音</div><div style="font-size:16px;color:${info.color};font-weight:700;font-family:Consolas;">${info.notes}</div><div style="font-size:12px;color:#666;margin:8px 0 4px;">🎸 级数</div><div style="font-size:14px;color:#aaa;font-family:Consolas;">${info.roman}</div></div></div><div style="margin-top:8px;font-size:13px;color:#bbb;line-height:1.6;">${currentLevel >= 2 ? info.desc : info.simple}</div><button onclick="this.closest('.modal-overlay').remove()" style="margin-top:12px;background:#3a2a1e;color:#ddd;border:none;padding:6px 20px;border-radius:4px;cursor:pointer;font-family:inherit;">关闭</button></div>`;
  document.body.appendChild(modal);
}

function togglePlay() { if(isPlaying) audio.pause(); else audio.play().catch(e=>{ if(e.name==='NotAllowedError') alert('请先在页面上点击激活音频'); else alert('⚠️ 找不到音频文件'); }); }
function seekTo(val) { audio.currentTime = parseFloat(val); }
function setSpeed(val) { audio.playbackRate = parseFloat(val); }

function clickLine(idx) {
  const item = LYRIC_DATA[idx];
  audio.currentTime = item.time;
  if(!isPlaying) audio.play().catch(()=>{});
  updateActiveLine(idx); updateKnowledge(idx);
  document.getElementById('sectionTag').textContent = item.section.replace(/[0-9:★]/g,'').trim();
}

function updateActiveLine(idx) {
  document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.lyric-line[data-idx="${idx}"]`);
  if(el) { el.classList.add('active'); el.scrollIntoView({block:'center',behavior:'smooth'}); }
  activeIdx = idx;
}

function setLevel(lv) {
  currentLevel = lv;
  document.body.className = document.body.className.replace(/level-\d/g,'') + ` level-${lv}`;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.level)===lv));
  document.getElementById('modeIndicator').textContent = `L${lv} · ${getFocusLabel()}`;
  renderLyrics(); if(activeIdx>=0) { updateKnowledge(activeIdx); updateActiveLine(activeIdx); }
}
function getFocusLabel() { const lb={all:'全部',lyrics:'歌词',instruments:'乐器',chords:'和弦',techniques:'技巧'}; return lb[currentFocus]||'全部'; }
function setFocus(mode) { currentFocus=mode; document.body.className = document.body.className.replace(/focus-\w+/g,'') + ` level-${currentLevel} focus-${mode}`; document.querySelectorAll('.focus-btn').forEach(b=>b.classList.toggle('active',b.dataset.focus===mode)); document.getElementById('modeIndicator').textContent = `L${currentLevel} · ${getFocusLabel()}`; }

audio.addEventListener('play', () => { isPlaying=true; document.getElementById('playBtn').textContent='⏸'; });
audio.addEventListener('pause', () => { isPlaying=false; document.getElementById('playBtn').textContent='▶'; });
audio.addEventListener('ended', () => { isPlaying=false; document.getElementById('playBtn').textContent='▶'; });
audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime, dur = audio.duration || 279;
  document.getElementById('seekBar').max = dur;
  document.getElementById('seekBar').value = t;
  document.getElementById('timeDisplay').textContent = `${formatTime(t)} / ${formatTime(dur)}`;
  let best = -1;
  for(let i=LYRIC_DATA.length-1; i>=0; i--) { if(t >= LYRIC_DATA[i].time - 0.3) { best=i; break; } }
  if(best>=0 && best!==activeIdx) { updateActiveLine(best); updateKnowledge(best); const sec=LYRIC_DATA[best].section; document.getElementById('sectionTag').textContent=sec.replace(/[0-9:★]/g,'').trim(); }
});

document.addEventListener('keydown', e => { if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT') return; if(e.code==='Space'){ e.preventDefault(); togglePlay(); } if(e.code==='ArrowLeft'){ audio.currentTime=Math.max(0,audio.currentTime-5); } if(e.code==='ArrowRight'){ audio.currentTime=Math.min(audio.duration||279,audio.currentTime+5); } if(e.code==='ArrowUp'){ audio.volume=Math.min(1,audio.volume+0.1); } if(e.code==='ArrowDown'){ audio.volume=Math.max(0,audio.volume-0.1); } });

document.addEventListener('DOMContentLoaded', () => { renderLyrics(); setLevel(1); setFocus('all'); if(LYRIC_DATA.length>0) updateKnowledge(0); });
</script>
</body>
</html>
